<script>
// Tab switching - aggressive local-file friendly version
function openTab(tabId) {
  // Hide everything
  document.querySelectorAll('.tab-section').forEach(function(el) {
    el.style.display = 'none';
  });
  // Remove active class from buttons
  document.querySelectorAll('.tab-buttons button').forEach(function(btn) {
    btn.classList.remove('active');
  });

  // Show selected tab
  var target = document.getElementById(tabId);
  if (target) {
    target.style.display = 'block';
  }

  // Highlight button
  var btn = document.querySelector('button[data-tab="' + tabId + '"]');
  if (btn) {
    btn.classList.add('active');
  }
}

// Setup tabs as soon as possible
function init() {
  // Attach click listeners
  var buttons = document.querySelectorAll('.tab-buttons button');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      var tabId = this.getAttribute('data-tab');
      openTab(tabId);
    });
  }

  // Show default tab
  openTab('tab-refrig');
}

// Run now if DOM is already ready, otherwise wait
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(init, 1);  // tiny delay helps on file://
} else {
  document.addEventListener('DOMContentLoaded', init);
}

// Extra fallback (some browsers need this on file://)
setTimeout(init, 500);
</script>
