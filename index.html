<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global HVAC Converter Suite</title>
<link rel="manifest" href="manifest.json">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f2f2f2;
        color: #000;
        transition: background 0.3s, color 0.3s;
    }

    /* DARK MODE */
    body.dark {
        background: #1a1a1a;
        color: #e6e6e6;
    }
    body.dark .box {
        background: #2a2a2a;
        color: #e6e6e6;
    }
    body.dark .tabs {
        background: #00385a;
    }
    body.dark .tab {
        color: #cfe8ff;
    }
    body.dark .tab.active {
        background: #1a1a1a;
        color: #fff;
    }
    body.dark button {
        background: #0063a5;
    }
    body.dark footer {
        background: #00385a;
        border-top-color: #002a44;
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
        padding: 10px 15px;
        border-bottom: 2px solid #004b7a;
    }
    header img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
    }
    header .title {
        font-size: 18px;
        font-weight: bold;
        margin-left: 10px;
        color: #004b7a;
    }
    header .left {
        display: flex;
        align-items: center;
    }
    header .toggle {
        font-size: 14px;
        cursor: pointer;
        color: #004b7a;
        font-weight: bold;
    }

    .tabs {
        display: flex;
        overflow-x: auto;
        background: #004b7a;
    }
    .tab {
        flex: 1;
        text-align: center;
        padding: 10px 6px;
        color: #cfe8ff;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
    }
    .tab.active {
        background: #ffffff;
        color: #004b7a;
        font-weight: bold;
        border-bottom: 2px solid #ffffff;
    }

    .content {
        padding: 10px;
    }
    .box {
        background: #ffffff;
        padding: 14px;
        border-radius: 10px;
        margin-top: 10px;
        transition: background 0.3s, color 0.3s;
    }
    h2 {
        margin: 0 0 8px;
        font-size: 18px;
        color: #004b7a;
    }
    label {
        font-weight: bold;
        margin-top: 8px;
        display: block;
        font-size: 13px;
    }
    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        font-size: 14px;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        padding: 9px;
        font-size: 14px;
        margin-top: 10px;
        background: #004b7a;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    button:hover {
        background: #0063a5;
    }
    .result {
        margin-top: 8px;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        min-height: 20px;
    }

    footer {
        background:#004b7a;
        color:white;
        text-align:center;
        padding:15px 10px;
        margin-top:20px;
        font-size:14px;
        border-top:3px solid #00385a;
    }
    footer a {
        color:#cfe8ff;
        text-decoration:none;
    }
</style>

<script>
// -------------------------------
// DARK MODE TOGGLE
// -------------------------------
function toggleDarkMode() {
    const body = document.body;
    const toggle = document.getElementById("darkToggle");

    body.classList.toggle("dark");

    const isDark = body.classList.contains("dark");
    toggle.textContent = "Dark Mode: " + (isDark ? "ON" : "OFF");

    localStorage.setItem("darkMode", isDark ? "on" : "off");
}

window.onload = function() {
    if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        document.getElementById("darkToggle").textContent = "Dark Mode: ON";
    }
    showTab('tab-convert');
};

// -------------------------------
// TAB HANDLING
// -------------------------------
function showTab(tabId) {
    const tabs = document.querySelectorAll('.tab');
    const sections = document.querySelectorAll('.tab-section');

    tabs.forEach(t => t.classList.remove('active'));
    sections.forEach(s => s.style.display = 'none');

    document.getElementById(tabId).style.display = 'block';
    document.querySelector('[data-tab="' + tabId + '"]').classList.add('active');
}

// -------------------------------
// MASTER CONVERSION TABLE
// -------------------------------
const conversions = {
    "kw_btu":  i => i * 3412.142,
    "btu_kw":  i => i / 3412.142,
    "kw_ton":  i => i / 3.5168525,
    "ton_kw":  i => i * 3.5168525,
    "cfm_fpm": i => i * 144,
    "fpm_cfm": i => i / 144,
    "ls_cfm":  i => i * 2.11888,
    "cfm_ls":  i => i / 2.11888,
    "psi_inwc": i => i * 27.7076,
    "inwc_psi": i => i / 27.7076,
    "pa_inwc":  i => i / 249.0889,
    "inwc_pa":  i => i * 249.0889,
    "c_f": i => (i * 9/5) + 32,
    "f_c": i => (i - 32) * 5/9,
    "w_kw": i => i / 1000,
    "kw_w": i => i * 1000
};

function convert() {
    const type = document.getElementById("conversion").value;
    const input = parseFloat(document.getElementById("value").value);
    const output = document.getElementById("output");

    if (isNaN(input)) return output.textContent = "Enter a number";

    const fn = conversions[type];
    output.textContent = fn ? fn(input).toFixed(3) : "Conversion not found";
}

// -------------------------------
// REFRIGERATION
// -------------------------------
function calcSuperheat() {
    const sat = parseFloat(sh_sat.value);
    const line = parseFloat(sh_line.value);
    sh_result.textContent = isNaN(sat)||isNaN(line) ? "Enter both" : (line - sat).toFixed(1)+" °F";
}
function calcSubcool() {
    const sat = parseFloat(sc_sat.value);
    const line = parseFloat(sc_line.value);
    sc_result.textContent = isNaN(sat)||isNaN(line) ? "Enter both" : (sat - line).toFixed(1)+" °F";
}

// -------------------------------
// AIRFLOW
// -------------------------------
function calcCFM() {
    const area = parseFloat(af_area.value);
    const vel = parseFloat(af_vel.value);
    af_result.textContent = isNaN(area)||isNaN(vel) ? "Enter both" : (area * vel).toFixed(1)+" CFM";
}
function calcVelocity() {
    const cfm = parseFloat(af_cfm.value);
    const area = parseFloat(af_area2.value);
    af_result2.textContent = isNaN(cfm)||isNaN(area) ? "Enter both" : (cfm / area).toFixed(1)+" FPM";
}

// -------------------------------
// PSYCHROMETRICS (simplified)
// -------------------------------
function calcDewPoint() {
    const t = parseFloat(ps_dry.value);
    const rh = parseFloat(ps_rh.value);
    if (isNaN(t)||isNaN(rh)) return ps_result.textContent = "Enter both";

    const dp = t - ((100 - rh)/5);
    ps_result.textContent = dp.toFixed(1)+" °F (approx)";
}

// -------------------------------
// SYSTEM DIAGNOSTICS
// -------------------------------
function calcDeltaT() {
    const ret = parseFloat(sd_return.value);
    const sup = parseFloat(sd_supply.value);
    sd_result.textContent = isNaN(ret)||isNaN(sup) ? "Enter both" : (ret - sup).toFixed(1)+" °F";
}
</script>
</head>

<body>

<header>
    <div class="left">
        <img src="icon.png">
        <div class="title">Global HVAC Converter Suite</div>
    </div>
    <div id="darkToggle" class="toggle" onclick="toggleDarkMode()">Dark Mode: OFF</div>
</header>

<div class="tabs">
    <div class="tab active" data-tab="tab-convert" onclick="showTab('tab-convert')">Conversions</div>
    <div class="tab" data-tab="tab-refrig" onclick="showTab('tab-refrig')">Refrigeration</div>
    <div class="tab" data-tab="tab-airflow" onclick="showTab('tab-airflow')">Airflow</div>
    <div class="tab" data-tab="tab-psychro" onclick="showTab('tab-psychro')">Psychrometrics</div>
    <div class="tab" data-tab="tab-system" onclick="showTab('tab-system')">System Diagnostics</div>
</div>

<div class="content">

<!-- ------------------ CONVERSIONS ------------------ -->
<div id="tab-convert" class="tab-section">
    <div class="box">
        <h2>Conversions</h2>

        <label>Type</label>
        <select id="conversion">
            <option value="kw_btu">kW → BTU/hr</option>
            <option value="btu_kw">BTU/hr → kW</option>
            <option value="kw_ton">kW → Tons</option>
            <option value="ton_kw">Tons → kW</option>
            <option value="cfm_fpm">CFM → FPM</option>
            <option value="fpm_cfm">FPM → CFM</option>
            <option value="ls_cfm">L/s → CFM</option>
            <option value="cfm_ls">CFM → L/s</option>
            <option value="psi_inwc">PSI → in.wc</option>
            <option value="inwc_psi">in.wc → PSI</option>
            <option value="pa_inwc">Pa → in.wc</option>
            <option value="inwc_pa">in.wc → Pa</option>
            <option value="c_f">°C → °F</option>
            <option value="f_c">°F → °C</option>
            <option value="w_kw">W → kW</option>
            <option value="kw_w">kW → W</option>
        </select>

        <label>Value</label>
        <input id="value" type="number">

        <button onclick="convert()">Convert</button>

        <div id="output" class="result"></div>
    </div>
</div>

<!-- ------------------ REFRIGERATION ------------------ -->
<div id="tab-refrig" class="tab-section" style="display:none;">
    <div class="box">
        <h2>Superheat</h2>
        <label>Saturation Temp (°F)</label>
        <input id="sh_sat" type="number">
        <label>Line Temp (°F)</label>
        <input id="sh_line" type="number">
        <button onclick="calcSuperheat()">Calculate</button>
        <div id="sh_result" class="result"></div>
    </div>

    <div class="box">
        <h2>Subcooling</h2>
        <label>Saturation Temp (°F)</label>
        <input id="sc_sat" type="number">
        <label>Liquid Line Temp (°F)</label>
        <input id="sc_line" type="number">
        <button onclick="calcSubcool()">Calculate</button>
        <div id="sc_result" class="result"></div>
    </div>
</div>

<!-- ------------------ AIRFLOW ------------------ -->
<div id="tab-airflow" class="tab-section" style="display:none;">
    <div class="box">
        <h2>CFM from Area × Velocity</h2>
        <label>Area (sq ft)</label>
        <input id="af_area" type="number">
        <label>Velocity (FPM)</label>
        <input id="af_vel" type="number">
        <button onclick="calcCFM()">Calculate</button>
        <div id="af_result" class="result"></div>
    </div>

    <div class="box">
        <h2>Velocity from CFM ÷ Area</h2>
        <label>CFM</label>
        <input id="af_cfm" type="number">
        <label>Area (sq ft)</label>
        <input id="af_area2" type="number">
        <button onclick="calcVelocity()">Calculate</button>
        <div id="af_result2" class="result"></div>
    </div>
</div>

<!-- ------------------ PSYCHROMETRICS ------------------ -->
<div id="tab-psychro" class="tab-section" style="display:none;">
    <div class="box">
        <h2>Dew Point (Approx)</h2>
        <label>Dry Bulb (°F)</label>
        <input id="ps_dry" type="number">
        <label>Relative Humidity (%)</label>
        <input id="ps_rh" type="number">
        <button onclick="calcDewPoint()">Calculate</button>
        <div id="ps_result" class="result"></div>
    </div>
</div>

<!-- ------------------ SYSTEM DIAGNOSTICS ------------------ -->
<div id="tab-system" class="tab-section" style="display:none;">
    <div class="box">
        <h2>Temperature Split</h2>
        <label>Return Air (°F)</label>
        <input id="sd_return" type="number">
        <label>Supply Air (°F)</label>
        <input id="sd_supply" type="number">
        <button onclick="calcDeltaT()">Calculate</button>
        <div id="sd_result" class="result"></div>
    </div>
</div>

</div>

<footer>
    Global HVAC Converter Suite • Built for field technicians
</footer>

</body>
</html>
