<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC Converter</title>
<link rel="manifest" href="manifest.json">

<style>
    body { 
        font-family: Arial; 
        padding: 20px; 
        background: #f2f2f2; 
    }
    h1 { 
        text-align: center; 
        margin-bottom: 20px; 
    }
    select, input { 
        width: 100%; 
        padding: 12px; 
        margin-top: 10px; 
        font-size: 18px; 
    }
    .box { 
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
    }
    .result { 
        margin-top: 20px; 
        font-size: 22px; 
        font-weight: bold; 
        text-align: center; 
    }
</style>

<script>
function convert() {
    let type = document.getElementById("conversion").value;
    let input = parseFloat(document.getElementById("value").value);
    let output = document.getElementById("output");

    if (isNaN(input)) {
        output.innerHTML = "Enter a number";
        return;
    }

    let result = 0;

    if (type === "kw_btu") result = input * 3412.142;
    if (type === "kw_ton") result = input / 3.5168525;
    if (type === "ton_kw") result = input * 3.5168525;
    if (type === "btu_kw") result = input / 3412.142;

    output.innerHTML = result.toFixed(2);
}
</script>

</head>
<body>

<h1>HVAC Converter</h1>

<div class="box">
    <label>Conversion Type</label>
    <select id="conversion">
        <option value="kw_btu">kW ⇨ BTU/h</option>
        <option value="kw_ton">kW ⇨ Tons</option>
        <option value="ton_kw">Tons ⇨ kW</option>
        <option value="btu_kw">BTU/h ⇨ kW</option>
    </select>

    <label style="margin-top:15px;">Enter Value</label>
    <input id="value" type="number" placeholder="Enter number">

    <button onclick="convert()" style="margin-top:20px; width:100%; padding:12px; font-size:18px;">
        Convert
    </button>

    <div id="output" class="result"></div>
</div>

</body>
</html>
