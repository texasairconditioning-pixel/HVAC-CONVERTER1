<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global HVAC Solutions LLC</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        color: #222;
        transition: background 0.3s, color 0.3s;
    }

    /* Dark Mode */
    body.dark {
        background: #121212;
        color: #e6e6e6;
    }

    /* Header */
    header {
        background: #004b7a;
        color: white;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    header .left {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    header img {
        height: 55px;
    }

    header .title-block {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
    }

    header .title-block .name {
        font-size: 20px;
        font-weight: bold;
    }

    header .title-block .contact {
        font-size: 13px;
        opacity: 0.9;
    }

    /* Dark Mode Toggle */
    .toggle-btn {
        background: white;
        color: #004b7a;
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    body.dark .toggle-btn {
        background: #333;
        color: #fff;
    }

    /* Cards */
    .card {
        width: 100%;
        padding: 20px;
        background: white;
        margin: 15px 0;
        box-sizing: border-box;
        border-bottom: 1px solid #ddd;
        transition: background 0.3s, color 0.3s;
    }

    body.dark .card {
        background: #1e1e1e;
        border-bottom: 1px solid #444;
    }

    h2 {
        margin-top: 0;
        color: #004b7a;
    }

    body.dark h2 {
        color: #66baff;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #aaa;
        box-sizing: border-box;
    }

    body.dark input,
    body.dark select {
        background: #333;
        color: white;
        border: 1px solid #666;
    }

    button {
        background: #004b7a;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }

    .result-block {
        margin-top: 10px;
        padding: 12px;
        background: #e9f5ff;
        border-left: 4px solid #004b7a;
    }

    body.dark .result-block {
        background: #002f4d;
        border-left: 4px solid #66baff;
    }
</style>
</head>

<body>

<header>
    <div class="left">
        <img src="logo.png" alt="Logo">
        <div class="title-block">
            <div class="name">Global HVAC Solutions LLC</div>
            <div class="contact">1‑409‑749‑0650 • jlee@globalhvacsolutions.com</div>
        </div>
    </div>

    <button class="toggle-btn" onclick="toggleDarkMode()">Dark Mode</button>
</header>


<!-- ============================================================
     AIRFLOW CARD
============================================================ -->
<div class="card">
    <h2>Airflow Calculator</h2>

    <label>CFM</label>
    <input id="af_cfm" type="number">

    <label>Velocity (FPM)</label>
    <input id="af_vel" type="number">

    <label>Area (sq ft)</label>
    <input id="af_area" type="number">

    <button onclick="calcAirflow()">Calculate</button>

    <div id="af_result"></div>
</div>


<!-- ============================================================
     REFRIGERANT PT CARD
============================================================ -->
<div class="card">
    <h2>Refrigerant PT Chart</h2>

    <label>Refrigerant</label>
    <select id="ref_type">
        <option value="R410A">R‑410A</option>
        <option value="R22">R‑22</option>
    </select>

    <label>Pressure (psig)</label>
    <input id="ref_psig" type="number">

    <button onclick="calcPT()">Calculate</button>

    <div id="ref_result"></div>
</div>


<!-- ============================================================
     PSYCHROMETRICS CARD
============================================================ -->
<div class="card">
    <h2>Psychrometrics</h2>

    <label>Dry‑Bulb Temperature (°F)</label>
    <input id="psy_db" type="number">

    <label>Relative Humidity (%)</label>
    <input id="psy_rh" type="number">

    <button onclick="calcPsych()">Calculate</button>

    <div id="psychResults"></div>
</div>



<!-- ============================================================
     ENGINE (FULL JS FILE YOU APPROVED)
============================================================ -->
<script>

/* ============================================================
   GLOBAL HVAC SOLUTIONS — COMPLETE ENGINE FILE
============================================================ */

/* ---------- AIRFLOW ---------- */

function cfmFromAreaVelocity(areaSqFt, velocityFpm) {
  return areaSqFt * velocityFpm;
}

function velocityFromCfmArea(cfm, areaSqFt) {
  return cfm / areaSqFt;
}

function areaFromCfmVelocity(cfm, velocityFpm) {
  return cfm / velocityFpm;
}

function diameterInchesFromAreaSqFt(areaSqFt) {
  const areaSqIn = areaSqFt * 144;
  return Math.sqrt((4 * areaSqIn) / Math.PI);
}

function areaSqFtFromDiameterInches(dIn) {
  const areaSqIn = (Math.PI * dIn * dIn) / 4;
  return areaSqIn / 144;
}

const STANDARD_ROUND_SIZES_IN = [4,5,6,7,8,9,10,11,12,14,16,18,20];

function nearestStandardRoundDiameter(dIn) {
  let best = STANDARD_ROUND_SIZES_IN[0];
  let bestDiff = Math.abs(dIn - best);
  for (const size of STANDARD_ROUND_SIZES_IN) {
    const diff = Math.abs(dIn - size);
    if (diff < bestDiff) {
      best = size;
      bestDiff = diff;
    }
  }
  return best;
}

/* ---------- REFRIGERANT PT ---------- */

const REFRIG_PT_TABLES = {
  R410A: [
    { p: 50, t: 16 },
    { p: 100, t: 31 },
    { p: 150, t: 43 },
    { p: 200, t: 54 },
    { p: 250, t: 63 },
    { p: 300, t: 72 }
  ],
  R22: [
    { p: 50, t: 26 },
    { p: 75, t: 35 },
    { p: 100, t: 41 },
    { p: 125, t: 47 },
    { p: 150, t: 52 },
    { p: 175, t: 57 }
  ]
};

function interpolatePT(table, psig) {
  if (!table || table.length === 0) return null;
  if (psig <= table[0].p) return table[0].t;
  if (psig >= table[table.length - 1].p) return table[table.length - 1].t;

  for (let i = 0; i < table.length - 1; i++) {
    const p1 = table[i].p;
    const t1 = table[i].t;
    const p2 = table[i + 1].p;
    const t2 = table[i + 1].t;

    if (psig >= p1 && psig <= p2) {
      const ratio = (psig - p1) / (p2 - p1);
      return t1 + ratio * (t2 - t1);
    }
  }
  return null;
}

function satTempFromPressure(refrigerantKey, psig) {
  const table = REFRIG_PT_TABLES[refrigerantKey];
  return interpolatePT(table, psig);
}

/* ---------- PSYCHROMETRICS ---------- */

function dewPointF(dbF, rhPercent) {
  const dbC = (dbF - 32) * 5/9;
  const rh = rhPercent / 100;

  const a = 17.27;
  const b = 237.7;

  const gamma = Math.log(rh) + (a * dbC) / (b + dbC);
  const dewC = (b * gamma) / (a - gamma);

  return dewC * 9/5 + 32;
}

function showPsychrometricsResults(dbF, rhPercent) {
  const dewF = dewPointF(dbF, rhPercent);

  const resultHTML = `
    <div class="result-block">
      <p><strong>Dry‑bulb:</strong> ${dbF.toFixed(1)} °F</p>
      <p><strong>Relative Humidity:</strong> ${rhPercent.toFixed(1)} %</p>
      <p><strong>Dew Point:</strong> ${dewF.toFixed(1)} °F</p>
    </div>
  `;

  document.getElementById("psychResults").innerHTML = resultHTML;
}

/* ============================================================
   UI CALC FUNCTIONS
============================================================ */

function calcAirflow() {
  const cfm = parseFloat(document.getElementById("af_cfm").value);
  const vel = parseFloat(document.getElementById("af_vel").value);
  const area = parseFloat(document.getElementById("af_area").value);

  let out = "";

  if (!isNaN(cfm) && !isNaN(vel)) {
    out += `<p><strong>Area:</strong> ${(cfm/vel).toFixed(3)} sq ft</p>`;
  }
  if (!isNaN(cfm) && !isNaN(area)) {
    out += `<p><strong>Velocity:</strong> ${(cfm/area).toFixed(1)} fpm</p>`;
  }
  if (!isNaN(vel) && !isNaN(area)) {
    out += `<p><strong>CFM:</strong> ${(vel*area).toFixed(1)}</p>`;
  }

  document.getElementById("af_result").innerHTML =
    `<div class="result-block">${out}</div>`;
}

function calcPT() {
  const ref = document.getElementById("ref_type").value;
  const psig = parseFloat(document.getElementById("ref_psig").value);

  const t = satTempFromPressure(ref, psig);

  document.getElementById("ref_result").innerHTML = `
    <div class="result-block">
      <p><strong>Saturation Temp:</strong> ${t.toFixed(1)} °F</p>
    </div>
  `;
}

function calcPsych() {
  const db = parseFloat(document.getElementById("psy_db").value);
  const rh = parseFloat(document.getElementById("psy_rh").value);

  showPsychrometricsResults(db, rh);
}

/* ---------- DARK MODE ---------- */

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
