<script>
    // ========================================================
    // TAB SWITCHING
    // ========================================================
    function openTab(e, tabName) {
      document.querySelectorAll(".tab-content").forEach(tc => tc.style.display = "none");
      document.querySelectorAll(".tab-button").forEach(tb => tb.classList.remove("active"));
      const tab = document.getElementById(tabName);
      if (tab) tab.style.display = "block";
      if (e && e.currentTarget) e.currentTarget.classList.add("active");

      // Force reload news when News tab is opened
      if (tabName === 'news') loadNews();
    }

    // ========================================================
    // THEME TOGGLE
    // ========================================================
    function toggleTheme() {
      const isDark = document.body.dataset.theme === "dark";
      document.body.dataset.theme = isDark ? "light" : "dark";
      const toggleBtn = document.querySelector('.theme-toggle');
      if (toggleBtn) toggleBtn.textContent = isDark ? "🌙" : "☀️";
    }

    // ========================================================
    // UNIT CONVERTER & CALCULATORS (unchanged)
    // ========================================================
    const convs = {
      'cmh_to_cfm': {fn: v => v * 0.588578, from: 'CMH', to: 'CFM'},
      // ... (keep all your other conversions exactly as they are)
      'gallons_to_liters': {fn: v => v * 3.78541, from: 'US Gal', to: 'Liters'},
      'liters_to_gallons': {fn: v => v / 3.78541, from: 'Liters', to: 'US Gal'}
    };

    function calculate() {
      const key = document.getElementById('conversion').value;
      const val = parseFloat(document.getElementById('value').value);
      const resultEl = document.getElementById('result');
      if (!key || isNaN(val)) {
        resultEl.innerHTML = '⚠️ Please select a conversion and enter a valid numeric value.';
        return;
      }
      const c = convs[key];
      const res = c.fn(val);
      resultEl.innerHTML = `<strong>${val} ${c.from} = ${res.toFixed(4)} ${c.to}</strong>`;
    }

    function clearAll() {
      document.getElementById('value').value = '';
      document.getElementById('result').innerHTML = '';
    }

    // Keep all your other calculator functions (calculateMotor, calculateVoltageDrop, etc.) here unchanged

    // ========================================================
    // NEWS & MARKETS - EASY TO UPDATE
    // ========================================================
    // 🔥🔥🔥 EDIT THIS ARRAY TO UPDATE NEWS 🔥🔥🔥
    // Change or add headlines here. Save file and hard refresh (Ctrl+Shift+R)
    const topHeadlines = [
      "Iranian attacks damage ~17% of Qatar LNG export capacity at Ras Laffan; repairs expected to take up to five years.",
      "Strait of Hormuz remains high-risk with severely reduced tanker traffic.",
      "Brent crude oil prices surge to approximately $109 per barrel.",
      "QatarEnergy declares force majeure on multiple LNG contracts.",
      "Asian LNG buyers curtail purchases due to supply shortfalls.",
      "Global energy markets face prolonged impacts from Gulf disruptions.",
      "US naval deployments increased in the region.",
      "Higher freight costs affecting fertilizers and chemicals.",
      "European natural gas prices rise sharply.",
      "Analysts warn of potential for further oil price volatility."
    ];

    function loadNews() {
      const contentEl = document.getElementById('news-content');
      if (!contentEl) return;
      contentEl.innerHTML = '';
      topHeadlines.forEach(headline => {
        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `<strong>${headline}</strong>`;
        contentEl.appendChild(div);
      });
    }

    // ========================================================
    // INITIALIZATION
    // ========================================================
    window.addEventListener('DOMContentLoaded', () => {
      // Optional: Pre-load news when page first opens
      // loadNews();
    });
  </script>
