<!DOCTYPE html>
<!--  -->
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global HVAC Converter Suite</title>
<link rel="manifest" href="manifest.json">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f2f2f2;
        color: #000;
        transition: background 0.3s, color 0.3s;
    }

    /* DARK MODE */
    body.dark {
        background: #1a1a1a;
        color: #e6e6e6;
    }
    body.dark .box {
        background: #2a2a2a;
        color: #e6e6e6;
    }
    body.dark .tabs {
        background: #00385a;
    }
    body.dark .tab {
        color: #cfe8ff;
    }
    body.dark .tab.active {
        background: #1a1a1a;
        color: #fff;
    }
    body.dark button {
        background: #0063a5;
    }
    body.dark footer {
        background: #00385a;
        border-top-color: #002a44;
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
        padding: 10px 15px;
        border-bottom: 2px solid #004b7a;
    }
    header img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
    }
    header .title {
        font-size: 18px;
        font-weight: bold;
        margin-left: 10px;
        color: #004b7a;
    }
    header .left {
        display: flex;
        align-items: center;
    }
    header .toggle {
        font-size: 14px;
        cursor: pointer;
        color: #004b7a;
        font-weight: bold;
    }

    .tabs {
        display: flex;
        overflow-x: auto;
        background: #004b7a;
    }
    .tab {
        flex: 1;
        text-align: center;
        padding: 10px 6px;
        color: #cfe8ff;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
    }
    .tab.active {
        background: #ffffff;
        color: #004b7a;
        font-weight: bold;
        border-bottom: 2px solid #ffffff;
    }

    .content {
        padding: 10px;
    }
    .box {
        background: #ffffff;
        padding: 14px;
        border-radius: 10px;
        margin-top: 10px;
        transition: background 0.3s, color 0.3s;
    }
    h2 {
        margin: 0 0 8px;
        font-size: 18px;
        color: #004b7a;
    }
    label {
        font-weight: bold;
        margin-top: 8px;
        display: block;
        font-size: 13px;
    }
    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        font-size: 14px;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        padding: 9px;
        font-size: 14px;
        margin-top: 10px;
        background: #004b7a;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    button:hover {
        background: #0063a5;
    }
    .result {
        margin-top: 8px;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        min-height: 20px;
    }

    footer {
        background:#004b7a;
        color:white;
        text-align:center;
        padding:15px 10px;
        margin-top:20px;
        font-size:14px;
        border-top:3px solid #00385a;
    }
    footer a {
        color:#cfe8ff;
        text-decoration:none;
    }
</style>

<script>
// -------------------------------
// DARK MODE TOGGLE
// -------------------------------
function toggleDarkMode() {
    const body = document.body;
    const toggle = document.getElementById("darkToggle");

    body.classList.toggle("dark");

    const isDark = body.classList.contains("dark");
    toggle.textContent = "Dark Mode: " + (isDark ? "ON" : "OFF");

    localStorage.setItem("darkMode", isDark ? "on" : "off");
}

window.onload = function() {
    if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        document.getElementById("darkToggle").textContent = "Dark Mode: ON";
    }
    showTab('tab-convert');
};

// -------------------------------
// TAB HANDLING
// -------------------------------
function showTab(tabId) {
    const tabs = document.querySelectorAll('.tab');
    const sections = document.querySelectorAll('.tab-section');

    tabs.forEach(t => t.classList.remove('active'));
    sections.forEach(s => s.style.display = 'none');

    document.getElementById(tabId).style.display = 'block';
    document.querySelector('[data-tab="' + tabId + '"]').classList.add('active');
}

// -------------------------------
// MASTER CONVERSION TABLE
// -------------------------------
const conversions = {
    "kw_btu":  i => i * 3412.142,
    "btu_kw":  i => i / 3412.142,
    "kw_ton":  i => i / 3.5168525,
    "ton_kw":  i => i * 3.5168525,
    "cfm_fpm": i => i * 144,
    "fpm_cfm": i => i / 144,
    "ls_cfm":  i => i * 2.11888,
    "cfm_ls":  i => i / 2.11888,
    "psi_inwc": i => i * 27.7076,
    "inwc_psi": i => i / 27.7076,
    "pa_inwc":  i => i / 249.0889,
    "inwc_pa":  i => i * 249.0889,
    "c_f": i => (i * 9/5) + 32,
    "f_c": i => (i - 32) * 5/9,
    "w_kw": i => i / 1000,
    "kw_w": i => i * 1000
};

function convert() {
    const type = document.getElementById("conversion").value;
    const input = parseFloat(document.getElementById("value").value);
    const output = document.getElementById("output");

    if (isNaN(input)) return output.textContent = "Enter a number";

    const fn = conversions[type];
    output.textContent = fn ? fn(input).toFixed(3) : "Conversion not found";
}

}
