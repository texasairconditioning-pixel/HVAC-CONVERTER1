<script>
    // ========================================================
    // TAB SWITCHING - Robust and reliable
    // ========================================================
    function openTab(e, tabName) {
      // Hide all tab contents
      document.querySelectorAll(".tab-content").forEach(tc => {
        tc.style.display = "none";
      });
      // Remove active class from all tab buttons
      document.querySelectorAll(".tab-button").forEach(tb => {
        tb.classList.remove("active");
      });
      // Show the selected tab
      const selectedTab = document.getElementById(tabName);
      if (selectedTab) {
        selectedTab.style.display = "block";
      }
      // Highlight the clicked button
      if (e && e.currentTarget) {
        e.currentTarget.classList.add("active");
      }
    }

    // ========================================================
    // THEME TOGGLE
    // ========================================================
    function toggleTheme() {
      const isDark = document.body.dataset.theme === "dark";
      document.body.dataset.theme = isDark ? "light" : "dark";
      const toggleBtn = document.querySelector('.theme-toggle');
      if (toggleBtn) toggleBtn.textContent = isDark ? "🌙" : "☀️";
    }

    // ========================================================
    // UNIT CONVERTER
    // ========================================================
    const convs = {
      'cmh_to_cfm': {fn: v => v * 0.588578, from: 'CMH', to: 'CFM'},
      'cfm_to_cmh': {fn: v => v / 0.588578, from: 'CFM', to: 'CMH'},
      'cfm_to_m3h': {fn: v => v * 1.69901, from: 'CFM', to: 'm³/h'},
      'm3h_to_cfm': {fn: v => v / 1.69901, from: 'm³/h', to: 'CFM'},
      'cfm_to_ls': {fn: v => v * 0.471947, from: 'CFM', to: 'L/s'},
      'ls_to_cfm': {fn: v => v / 0.471947, from: 'L/s', to: 'CFM'},
      'mm_to_inches': {fn: v => v / 25.4, from: 'mm', to: 'inches'},
      'inches_to_mm': {fn: v => v * 25.4, from: 'inches', to: 'mm'},
      'kw_to_btuh': {fn: v => v * 3412.142, from: 'kW', to: 'BTU/h'},
      'btuh_to_kw': {fn: v => v / 3412.142, from: 'BTU/h', to: 'kW'},
      'kw_to_tons': {fn: v => v / 3.51685, from: 'kW', to: 'Tons'},
      'tons_to_kw': {fn: v => v * 3.51685, from: 'Tons', to: 'kW'},
      'btuh_to_tons': {fn: v => v / 12000, from: 'BTU/h', to: 'Tons'},
      'tons_to_btuh': {fn: v => v * 12000, from: 'Tons', to: 'BTU/h'},
      'c_to_f': {fn: v => v * 9 / 5 + 32, from: '°C', to: '°F'},
      'f_to_c': {fn: v => (v - 32) * 5 / 9, from: '°F', to: '°C'},
      'c_to_k': {fn: v => v + 273.15, from: '°C', to: 'K'},
      'k_to_c': {fn: v => v - 273.15, from: 'K', to: '°C'},
      'f_to_k': {fn: v => (v - 32) * 5 / 9 + 273.15, from: '°F', to: 'K'},
      'k_to_f': {fn: v => (v - 273.15) * 9 / 5 + 32, from: 'K', to: '°F'},
      'm_to_ft': {fn: v => v * 3.28084, from: 'm', to: 'ft'},
      'pa_to_inwg': {fn: v => v * 0.00401463, from: 'Pa', to: 'in. wg'},
      'pa_to_mmwg': {fn: v => v / 9.80665, from: 'Pa', to: 'mm wg'},
      'mmwg_to_pa': {fn: v => v * 9.80665, from: 'mm wg', to: 'Pa'},
      'pa_to_psi': {fn: v => v / 6894.76, from: 'Pa', to: 'psi'},
      'inwg_to_psi': {fn: v => v / 27.708, from: 'in. wg', to: 'psi'},
      'inwg_to_mmwg': {fn: v => v * 25.4, from: 'in. wg', to: 'mm wg'},
      'ms_to_fpm': {fn: v => v * 196.85, from: 'm/s', to: 'fpm'},
      'ms_to_knots': {fn: v => v * 1.94384, from: 'm/s', to: 'knots'},
      'knots_to_ms': {fn: v => v / 1.94384, from: 'knots', to: 'm/s'},
      'hp_to_kw': {fn: v => v * 0.7457, from: 'HP', to: 'kW'},
      'kw_to_hp': {fn: v => v / 0.7457, from: 'kW', to: 'HP'},
      'bar_to_psi': {fn: v => v * 14.5038, from: 'bar', to: 'psi'},
      'psi_to_bar': {fn: v => v / 14.5038, from: 'psi', to: 'bar'},
      'lpm_to_gpm': {fn: v => v * 0.264172, from: 'L/min', to: 'GPM'},
      'gpm_to_lpm': {fn: v => v / 0.264172, from: 'GPM', to: 'L/min'},
      'gallons_to_liters': {fn: v => v * 3.78541, from: 'US Gal', to: 'Liters'},
      'liters_to_gallons': {fn: v => v / 3.78541, from: 'Liters', to: 'US Gal'},
      'bar_to_kpa': {fn: v => v * 100, from: 'bar', to: 'kPa'},
      'kpa_to_bar': {fn: v => v / 100, from: 'kPa', to: 'bar'}
    };

    function calculate() {
      const key = document.getElementById('conversion').value;
      const val = parseFloat(document.getElementById('value').value);
      const resultEl = document.getElementById('result');
      if (!key || isNaN(val)) {
        resultEl.innerHTML = '⚠️ Please select a conversion and enter a valid numeric value.';
        return;
      }
      const c = convs[key];
      const res = c.fn(val);
      resultEl.innerHTML = `<strong>${val} ${c.from} = ${res.toFixed(4)} ${c.to}</strong>`;
    }

    function clearAll() {
      document.getElementById('value').value = '';
      document.getElementById('result').innerHTML = '';
    }

    // ========================================================
    // ALL CALCULATOR FUNCTIONS (unchanged from your original)
    // ========================================================
    function calculateMotor() {
      const hp = parseFloat(document.getElementById('motor-hp').value) || 0;
      if (hp === 0) { 
        document.getElementById('motor-result').innerHTML = 'Enter HP'; 
        return; 
      }
      const kw = hp * 0.746;
      const fla = (hp * 746) / (460 * 0.85 * 0.9);
      document.getElementById('motor-result').innerHTML = `<strong>${hp} HP = ${kw.toFixed(2)} kW</strong><br>Full Load Amps (460V 3-phase): <strong>${fla.toFixed(1)} A</strong>`;
    }

    function calculateVoltageDrop() {
      const length = parseFloat(document.getElementById('vd-length').value) || 0;
      const current = parseFloat(document.getElementById('vd-current').value) || 0;
      const gauge = document.getElementById('vd-gauge').value;
      const voltage = parseFloat(document.getElementById('vd-voltage').value) || 480;
      const r1000ft = {'14':2.525,'12':1.588,'10':0.999,'8':0.628,'6':0.395}[gauge] || 1.0;
      const resistance = (r1000ft * length / 1000) * 2;
      const dropVolts = resistance * current;
      const dropPercent = (dropVolts / voltage) * 100;
      const status = dropPercent < 3 ? '✅ Within 3% limit' : '⚠️ Exceeds 3% limit';
      document.getElementById('vd-result').innerHTML = `Voltage drop: <strong>${dropVolts.toFixed(2)} V (${dropPercent.toFixed(2)}%)</strong><br>${status}`;
    }

    function calculatePsychro() {
      const db = parseFloat(document.getElementById('dry-bulb').value) || 0;
      const wb = parseFloat(document.getElementById('wet-bulb').value) || 0;
      if (db === 0 || wb === 0) {
        document.getElementById('psychro-result').innerHTML = 'Enter dry-bulb and wet-bulb';
        return;
      }
      const rh = 100 * Math.exp((17.625 * (wb - 32) / (wb + 459.67)) - (17.625 * (db - 32) / (db + 459.67)));
      document.getElementById('psychro-result').innerHTML = `Relative Humidity ≈ <strong>${rh.toFixed(1)}%</strong>`;
    }

    function calculateDuct() {
      const cfm = parseFloat(document.getElementById('duct-cfm').value) || 0;
      const vel = parseFloat(document.getElementById('duct-velocity').value) || 1200;
      const shape = document.getElementById('duct-shape').value;
      if (cfm === 0) return;
      const area = cfm / vel;
      let result = '';
      if (shape === 'round') {
        const dia = Math.sqrt((4 * area) / Math.PI) * 12;
        result = `Round duct diameter: <strong>${dia.toFixed(1)} inches</strong>`;
      } else {
        const side = Math.sqrt(area) * 12;
        result = `Square duct: <strong>${side.toFixed(1)}" × ${side.toFixed(1)}"</strong>`;
      }
      document.getElementById('duct-result').innerHTML = result;
    }

    function calculatePipe() {
      const gpm = parseFloat(document.getElementById('pipe-gpm').value) || 0;
      const dia = parseFloat(document.getElementById('pipe-dia').value) || 0;
      const length = parseFloat(document.getElementById('pipe-length').value) || 0;
      if (gpm === 0 || dia === 0) return;
      const loss = 0.2083 * (100 / 140) ** 1.85 * (gpm ** 1.85) / (dia ** 4.87) * length / 100;
      document.getElementById('pipe-result').innerHTML = `Friction loss ≈ <strong>${loss.toFixed(2)} psi</strong>`;
    }

    function calculateFan() {
      const oldCFM = parseFloat(document.getElementById('fan-old-cfm').value) || 0;
      const oldSP = parseFloat(document.getElementById('fan-old-sp').value) || 0;
      const oldRPM = parseFloat(document.getElementById('fan-old-rpm').value) || 0;
      const newVal = parseFloat(document.getElementById('fan-new').value) || 0;
      const change = document.getElementById('fan-change').value;
      if (oldCFM === 0 || newVal === 0) return;
      let newCFM = oldCFM, newSP = oldSP, newRPM = oldRPM;
      if (change === 'cfm') {
        newCFM = newVal; newSP = oldSP * Math.pow(newCFM / oldCFM, 2); newRPM = oldRPM * (newCFM / oldCFM);
      } else if (change === 'sp') {
        newSP = newVal; newCFM = oldCFM * Math.sqrt(newSP / oldSP); newRPM = oldRPM * Math.sqrt(newSP / oldSP);
      } else {
        newRPM = newVal; newCFM = oldCFM * (newRPM / oldRPM); newSP = oldSP * Math.pow(newRPM / oldRPM, 2);
      }
      document.getElementById('fan-result').innerHTML = `New CFM: <strong>${newCFM.toFixed(0)}</strong><br>New SP: <strong>${newSP.toFixed(2)}</strong> in. wg<br>New RPM: <strong>${newRPM.toFixed(0)}</strong>`;
    }

    function calculateBattery() {
      const load = parseFloat(document.getElementById('battery-load').value) || 0;
      const hours = parseFloat(document.getElementById('battery-hours').value) || 0;
      const volt = parseFloat(document.getElementById('battery-volt').value) || 12;
      if (load === 0 || hours === 0) return;
      const ah = (load * hours) / volt;
      document.getElementById('battery-result').innerHTML = `Required capacity: <strong>${ah.toFixed(0)} Ah</strong>`;
    }

    function calculateWind() {
      const speed = parseFloat(document.getElementById('wind-speed').value) || 0;
      const area = parseFloat(document.getElementById('wind-area').value) || 0;
      if (speed === 0 || area === 0) return;
      const force = 0.00256 * speed * speed * area;
      document.getElementById('wind-result').innerHTML = `Wind force: <strong>${force.toFixed(0)} lbs</strong>`;
    }

    // ========================================================
    // NEWS & MARKETS - EASY TO UPDATE
    // ========================================================
    // 🔥🔥🔥 EDIT THIS ARRAY TO UPDATE NEWS HEADLINES 🔥🔥🔥
    // Add, remove, or change lines as needed. Save and refresh.
    const topHeadlines = [
      "Iranian attacks damage ~17% of Qatar LNG export capacity at Ras Laffan; repairs expected to take up to five years.",
      "Strait of Hormuz remains high-risk with severely reduced tanker traffic; global oil and LNG supply significantly disrupted.",
      "Brent crude oil prices surge to approximately $109 per barrel amid the ongoing supply shock.",
      "QatarEnergy declares force majeure on multiple LNG contracts due to facility damage and shipping issues.",
      "Asian LNG buyers curtail purchases as Middle East supply shortfalls intensify.",
      "Global energy markets face prolonged impacts; economic growth forecasts revised downward.",
      "US and allied naval deployments increased to monitor the situation in the Gulf.",
      "Broader effects include higher freight costs and disruptions to fertilizers and chemicals.",
      "European natural gas prices rise sharply as buyers seek alternative sourcing.",
      "Analysts warn of potential for further oil price volatility if disruptions persist."
    ];

    function loadNews() {
      const contentEl = document.getElementById('news-content');
      if (!contentEl) return;
      contentEl.innerHTML = '';
      topHeadlines.forEach(headline => {
        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `<strong>${headline}</strong>`;
        contentEl.appendChild(div);
      });
    }

    // ========================================================
    // INITIALIZATION
    // ========================================================
    window.onload = () => {
      // Pre-load news when the page starts (optional)
      // loadNews();   // Uncomment if you want news to load on startup
    };
  </script>
